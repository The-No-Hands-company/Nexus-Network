services:
  nexus-network:
    build: .
    container_name: nexus-network
    restart: unless-stopped
    ports:
      - "3700:3700"
    volumes:
      - nexus-network-data:/data
    environment:
      PORT: "3700"
      DATA_DIR: "/data"
      PUSH_INTERVAL_MS: "5000"
      CORS_ORIGIN: "*"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3700/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  nexus-network-data:
